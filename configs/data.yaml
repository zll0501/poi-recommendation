dataset:
  name: Foursquare NYC (TSMC2014)
  input_path: data/raw/dataset_TSMC2014_NYC.csv
  encoding: utf-8
  delimiter: ","

columns:
  userId: user_id
  venueId: poi_id
  venueCategoryId: category_id
  venueCategory: category_name
  latitude: latitude
  longitude: longitude
  timezoneOffset: timezone_offset_minutes
  utcTimestamp: utc_time_raw

time:
  utc_format: "%a %b %d %H:%M:%S %z %Y"
  local_timezone: America/New_York
  expected_utc_offsets_minutes:
    - -300
    - -240
  slots:
    - name: night
      start_hour: 0
      end_hour: 6
    - name: morning
      start_hour: 6
      end_hour: 12
    - name: afternoon
      start_hour: 12
      end_hour: 18
    - name: evening
      start_hour: 18
      end_hour: 24

audit:
  coordinate_round_decimals: 5
  valid_timezone_offset_min: -840
  valid_timezone_offset_max: 840

output:
  directory: data/processed
  audit_json: audit_report.json
  audit_markdown: audit_report.md
  cleaned_file: checkins_cleaned.csv
  cleaning_json: cleaning_report.json
  cleaning_markdown: cleaning_report.md
  train_file: train.csv
  validation_file: valid.csv
  test_file: test.csv
  split_json: split_report.json
  split_markdown: split_report.md
  encoded_train_file: train_encoded.csv
  encoded_validation_file: valid_encoded.csv
  encoded_test_file: test_encoded.csv
  mappings_file: id_mappings.json
  poi_metadata_file: poi_metadata.csv
  encoding_json: encoding_report.json
  encoding_markdown: encoding_report.md
  data_profile_json: data_profile.json
  data_profile_markdown: data_profile.md

cleaning:
  remove_exact_duplicates: true
  simultaneous_conflict_strategy: drop_group
  merge_consecutive_same_poi: true
  consecutive_same_poi_minutes: 10

filtering:
  min_user_checkins: 10
  min_poi_visits: 5
  iterative: true

split:
  method: global_chronological
  train_ratio: 0.8
  validation_ratio: 0.1
  test_ratio: 0.1
  timestamp_column: utc_time
  # Time Popular/Time-GRU receive the recommendation request timestamp.
  # The target location and all future events remain unknown.
  query_time_known: true
  candidate_scope: train_pois
  random_shuffle: false

encoding:
  fit_on: train
  pad_id: 0
  unknown_id: 1
  normal_id_start: 2
  vocabularies:
    user_id: user_idx
    poi_id: poi_idx
    category_id: category_idx

profiling:
  coordinate_round_decimals: 5
  coordinate_tolerance_m: 100
  expected_timezone_offsets_minutes:
    - -300
    - -240
  suspicious_speed_kmh: 300
  popularity_top_fractions:
    - 0.01
    - 0.05
    - 0.10
