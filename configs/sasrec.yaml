data_config: configs/data.yaml

model:
  name: sasrec
  # 两种模型保持相同主体参数，类别实验只切换 use_category。
  max_seq_len: 50
  hidden_size: 64
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  use_time: true
  use_category: false
  # 0 是 PAD，1～24 对应一天中的 0～23 时。
  num_time_tokens: 25

training:
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  epochs: 2
  patience: 2
  seed: 42
  device: auto

evaluation:
  top_k: [5, 10]
  output_k: 10
  mrr_k: 10

output:
  checkpoint: results/checkpoints/sasrec.pt
  predictions: results/predictions/sasrec_test.csv
  metrics: results/metrics/sasrec.json
