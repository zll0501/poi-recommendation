data_config: configs/data.yaml

model:
  name: sasrec
  # 纯 SASRec baseline：只使用 POI 与位置特征。
  max_seq_len: 50
  hidden_size: 64
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  use_time: false
  use_category: false
  # 保留统一配置字段；关闭时间特征时不会创建 Time Embedding。
  num_time_tokens: 25

training:
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  epochs: 50
  patience: 10
  seed: 42
  device: auto

evaluation:
  top_k: [5, 10]
  output_k: 10
  mrr_k: 10

output:
  checkpoint: results/checkpoints/sasrec.pt
  predictions: results/predictions/sasrec.csv
